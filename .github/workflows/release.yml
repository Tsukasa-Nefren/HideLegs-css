name: Build and Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  RELEASE_VERSION: "v1.1.0"

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "refs/tags/${{ env.RELEASE_VERSION }}" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_OUTPUT
            echo "A release for ${{ env.RELEASE_VERSION }} already exists. Skipping release steps."
          else
            echo "TAG_EXISTS=false" >> $GITHUB_OUTPUT
            echo "Creating release ${{ env.RELEASE_VERSION }}."
          fi

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        if: steps.check_tag.outputs.TAG_EXISTS == 'false'
        run: dotnet publish --configuration Release --no-build --output ./publish

      - name: Create release directory
        if: steps.check_tag.outputs.TAG_EXISTS == 'false'
        run: |
          mkdir -p release/addons/counterstrikesharp/plugins/HideLegs
          cp -r publish/* release/addons/counterstrikesharp/plugins/HideLegs/
          cp README.md release/
          cp LICENSE release/

      - name: Archive release files
        if: steps.check_tag.outputs.TAG_EXISTS == 'false'
        run: |
          cd release
          zip -r ../HideLegs-${{ env.RELEASE_VERSION }}.zip .

      - name: Create Release
        if: steps.check_tag.outputs.TAG_EXISTS == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.RELEASE_VERSION }}" ./HideLegs-${{ env.RELEASE_VERSION }}.zip \
            --title "HideLegs ${{ env.RELEASE_VERSION }}" \
            --notes "Automated release for ${{ env.RELEASE_VERSION }}"
